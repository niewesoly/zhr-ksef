# Dev stack: Postgres + Redis only. API and worker run on the host
# (pnpm dev / tsx watch) against these services. App + worker containers
# with full frontend/backend network isolation will be added in a later
# phase (see plan §Deployment).
#
# Ports are bound to 127.0.0.1 so they are never exposed on LAN/WAN by
# accident. Required secrets are read from .env and fail-fast if missing.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ksef}
      POSTGRES_USER: ${POSTGRES_USER:-ksef}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ksef} -d ${POSTGRES_DB:-ksef}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --appendonly
      - "yes"
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "PING"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

volumes:
  pgdata:
  redisdata:
