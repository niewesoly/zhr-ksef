info:
  name: Set Credentials
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/tenants/{{tenantId}}"
  headers:
    - name: content-type
      value: application/json
    - name: X-API-Key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "credentials": {
          "certBase64": "{{certBase64}}",
          "keyBase64": "{{keyBase64}}",
          "passphrase": "{{passphrase}}"
        }
      }
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns 200", function() {
          expect(res.status).to.equal(200);
        });

        test("tenant has certificate", function() {
          expect(res.body.tenant.hasCertificate).to.equal(true);
        });

        test("certificate info is returned", function() {
          expect(res.body.certificate).to.be.an("object");
          expect(res.body.certificate.notAfter).to.be.a("string");
          expect(res.body.certificate.subject).to.be.a("string");
        });

settings:
  encodeUrl: true
